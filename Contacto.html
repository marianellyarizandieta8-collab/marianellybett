<!DOCTYPE html>

<style>
body {
    font-family: 'Poppins', Arial, sans-serif;
    margin: 0;
    background: linear-gradient(to bottom, #d4a5ff, #7f5af0);
    color: #fff;
}
nav {
    background-color: rgba(0,0,0,0.7);
    padding: 10px;
    display: flex;
    justify-content: center;
}
nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
    transition: 0.3s;
    font-size: 18px;
}
nav a:hover {
    color: #ffd700;
    transform: scale(1.1);
}
section {
    max-width: 700px;
    margin: 50px auto;
    background-color: rgba(0,0,0,0.4);
    padding: 30px 25px;
    border-radius: 15px;
}
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: gold;
    text-shadow: 0 0 10px #ffd700, 0 0 20px #ffa500;
    text-align: center;
    margin-bottom: 25px;
}
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}
input, textarea {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}
input:focus, textarea:focus {
    outline: 2px solid #ffd700;
}
button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: gold;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #ffd700;
    transform: scale(1.05);
}
footer {
    text-align: center;
    padding: 15px;
    background-color: rgba(0,0,0,0.8);
    color: white;
    margin-top: 40px;

<section>
<h1>Contacto</h1>
<p>¿Tienes alguna duda o quieres comunicarte con nosotros? Envíanos un mensaje y te responderemos lo antes posible. 📧💬</p>

<form action="#" method="post">
    <input type="text" name="nombre" placeholder="Tu nombre" required>
    <input type="email" name="correo" placeholder="Tu correo electrónico" required>
    <textarea name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
    <button type="submit">Enviar</button>
</form>
