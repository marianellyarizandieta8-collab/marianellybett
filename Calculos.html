<section>
<h1>Cálculos</h1>

<p>¿Tienes alguna duda? Escríbenos o usa nuestra herramienta de cálculo 👇</p>

<!-- CALCULADORA -->
<div class="calculadora">
    <h2>🌡️ Convertidor de Temperatura</h2>

    <input type="number" id="temp" placeholder="Ingresa temperatura">

    <br><br>

    <button onclick="cToF()">Celsius → Fahrenheit</button>
    <button onclick="fToC()">Fahrenheit → Celsius</button>

    <div class="resultado" id="resultado"></div>
</div>

</section>

<footer>
<p>&copy; 2026 GO Entertainment. Todos los derechos reservados.</p>
</footer>

<script>
function cToF() {
    let c = document.getElementById("temp").value;

    if (c === "") {
        document.getElementById("resultado").innerHTML = "⚠️ Ingresa un valor";
        return;
    }

    let f = (c * 9/5) + 32;
    document.getElementById("resultado").innerHTML =
        c + " °C = " + f.toFixed(2) + " °F";
}

function fToC() {
    let f = document.getElementById("temp").value;

    if (f === "") {
        document.getElementById("resultado").innerHTML = "⚠️ Ingresa un valor";
        return;
    }

    let c = (f - 32) * 5/9;
    document.getElementById("resultado").innerHTML =
        f + " °F = " + c.toFixed(2) + " °C";
}
</script>
