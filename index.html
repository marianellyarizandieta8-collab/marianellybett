/* MENÚ */
nav {
    background-color: rgba(0,0,0,0.7);
    padding: 15px 0;

nav a {
    color: white;

/* LOGO */

    margin: 60px 0 10px;

}

    to { text-shadow: 0 0 20px #fff, 0 0 40px gold; }
}

/* CALCULADORA */

    padding: 10px;
    width: 80%;
    margin: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: gold;
    font-weight: bold;
    cursor: pointer;
}
